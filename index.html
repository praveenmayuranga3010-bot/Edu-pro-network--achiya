        .opt-btn { background: transparent; border: 1px solid var(--neon); color: #fff; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .opt-btn:hover { background: var(--neon); color: #000; font-weight: bold; }
        .correct { background: var(--neon) !important; color: #000 !important; }
        .btn-panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }

<script>
// --- 1. WELCOME 3D ---
const wScene = new THREE.Scene();
const wCam = new THREE.PerspectiveCamera(75, window.innerWidth/250, 0.1, 1000);
const wRen = new THREE.WebGLRenderer({ antialias: true, alpha: true });
wRen.setSize(window.innerWidth > 1000 ? 1000 : window.innerWidth, 250);
document.getElementById('welcome-3d').appendChild(wRen.domElement);
const wSphere = new THREE.Mesh(new THREE.SphereGeometry(2, 24, 24), new THREE.MeshBasicMaterial({ color: 0x39ff14, wireframe: true }));
wScene.add(wSphere);
wCam.position.z = 5;
function animW() { requestAnimationFrame(animW); wSphere.rotation.y += 0.005; wRen.render(wScene, wCam); }
animW();

// --- 2. 3D LAB SYSTEM ---
const lScene = new THREE.Scene();
const lCam = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
const lRen = new THREE.WebGLRenderer({ antialias: true });
const lDiv = document.getElementById('lab-canvas');
lRen.setSize(lDiv.clientWidth, 500);
lDiv.appendChild(lRen.domElement);
const lControls = new THREE.OrbitControls(lCam, lRen.domElement);
lCam.position.z = 15;

let currentModel;
function loadModel(type) {
    if(currentModel) lScene.remove(currentModel);
    currentModel = new THREE.Group();
    const material = new THREE.MeshBasicMaterial({color: 0x39ff14, wireframe: true});

    if(type === 'cell') {
        const core = new THREE.Mesh(new THREE.SphereGeometry(3, 16, 16), material);
        const nuc = new THREE.Mesh(new THREE.SphereGeometry(1, 8, 8), new THREE.MeshBasicMaterial({color: 0x39ff14}));
        currentModel.add(core, nuc);
    } else if(type === 'blood') {
        for(let i=0; i<15; i++) {
            const rbc = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.4, 8, 24), material);
            rbc.position.set(Math.random()*10-5, Math.random()*10-5, Math.random()*10-5);
            currentModel.add(rbc);
        }
    } else if(type === 'tree') {
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 1, 6), material);
        const leaves = new THREE.Mesh(new THREE.ConeGeometry(3, 6, 8), material);
        leaves.position.y = 4;
        currentModel.add(trunk, leaves);
    } else if(type === 'rna') {
        for(let i=0; i<40; i++) {
            const node = new THREE.Mesh(new THREE.SphereGeometry(0.2), material);
            node.position.set(Math.sin(i*0.3)*3, i*0.4 - 8, Math.cos(i*0.3)*3);
            currentModel.add(node);
        }
    } else if(type === 'neuron') {
        const center = new THREE.Mesh(new THREE.IcosahedronGeometry(1), material);
        currentModel.add(center);
        for(let i=0; i<10; i++) {
            const dendrite = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.2, 5), material);
            dendrite.rotation.z = Math.random() * Math.PI;
            dendrite.position.x = Math.sin(i) * 2;
            currentModel.add(dendrite);
        }
    } else if(type === 'stars') {
        const starGeo = new THREE.BufferGeometry();
        const coords = [];
        for(let i=0; i<1000; i++) coords.push(Math.random()*20-10, Math.random()*20-10, Math.random()*20-10);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x39ff14, size: 0.1}));
        currentModel.add(stars);
    } else if(type === 'alien') {
        const body = new THREE.Mesh(new THREE.OctahedronGeometry(3), material);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xffffff}));
        eye.position.set(0, 1.5, 2);
        currentModel.add(body, eye);
    }
    lScene.add(currentModel);
}
loadModel('cell');
function animL() { requestAnimationFrame(animL); if(currentModel) currentModel.rotation.y += 0.005; lControls.update(); lRen.render(lScene, lCam); }
animL();

// --- 3. 200+ ADVANCED A/L FACTS ---

    "ප්‍රෝටීන වල ප්‍රාථමික ව්‍යුහය තීරණය වන්නේ ඇමයිනෝ අම්ල අනුපිළිවෙල මගිනි.",

    "සෛල පටලය 'තරල විචිත්‍ර ආකෘතිය' (Fluid Mosaic Model) ලෙස හඳුන්වයි.",

    "RNA ලෝකය (RNA World) උපකල්පනයට අනුව මුල්ම ස්වයං-ප්‍රතිවලිත අණුව RNA වේ.",

    "සෛල ප්ලාස්ම පටලය අර්ධ පාරගම්‍ය වේ.",
    "ලයිසොසෝම සෛලීය ජීර්ණය සඳහා වැදගත් වේ."

// Generate 200 unique-feeling facts by variations
for(let i=1; i<=200; i++) {
    const d = document.createElement('div'); d.className = 'fact-item';
    const baseFact = alFacts[i % alFacts.length];
    d.innerText = `${i}. ${baseFact}`;
    fBox.appendChild(d);
}

// --- 4. ULTIMATE 25 QUIZ SYSTEM ---
const quizData = [
    {q: "සෛලයක ශක්ති ගබඩාව ලෙස හඳුන්වන්නේ කුමක්ද?", a: ["ATP", "DNA", "RNA", "Lipids"], c: 0},

    {q: "ප්‍රභාසංස්ලේෂණයේ ආලෝක ප්‍රතික්‍රියාව සිදුවන්නේ කොහේද?", a: ["ස්ට්‍රෝමාව", "තයිලකොයිඩ පටලය", "න්‍යෂ්ටිය", "මයිටොකොන්ඩ්‍රියාව"], c: 1},

let qIdx = 0;
function showQ() {
    if(qIdx >= quizData.length) {
        document.getElementById('quiz-area').innerHTML = `<h2 style="color:var(--neon)">MISSION ACCOMPLISHED! 🏆</h2><p>Biology Knowledge Sync Complete.</p><button class="opt-btn" onclick="location.reload()">RESTART UNIVERSE</button>`;
        return;
    }
    const d = quizData[qIdx];
    document.getElementById('q-header').innerText = `MISSION ${String(qIdx+1).padStart(2, '0')}/25`;
    document.getElementById('q-text').innerText = d.q;
    const g = document.getElementById('opt-grid'); g.innerHTML = '';
    d.a.forEach((o, i) => {
        const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = o;
        b.onclick = () => {
            if(i === d.c) {
                b.classList.add('correct');
                confetti({ particleCount: 150, spread: 70, colors: ['#39ff14'] });
                setTimeout(() => { qIdx++; showQ(); }, 1000);
            } else { alert("NEURAL MISMATCH: WRONG ANSWER. TRY AGAIN!"); }
        };
        g.appendChild(b);
    });
}
showQ();

window.onresize = () => { lRen.setSize(lDiv.clientWidth, 500); };
